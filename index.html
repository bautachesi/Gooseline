<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gooseline</title>
    <link rel="icon" type="image/png" href="Gooseline-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="index-styles.css">
</head>
<body>
    <header id="main-header">
        <div class="header-left" id="header-logo">
            <img src="Gooseline-text-alt.png" alt="Gooseline">
        </div>
        <nav class="header-center">
            <button>DOWNLOAD</button>
            <button id="btn-about">ABOUT</button>
            <button id="btn-help">HELP</button>
        </nav>
        <div class="header-right">
            <button id="btn-get-started">GET STARTED</button>
        </div>
    </header>

    <main id="main-content">
        <h1>Message with more privacy, and more geese.</h1>
        <p>Gooseline doesn't sting your data or your messages.</p>
        <div class="cta-buttons">
            <button class="btn-download">DOWNLOAD</button>
            <button class="btn-goose-web" id="btn-goose-web">GOOSE WEB</button>
        </div>
    </main>

    <script src="index-script.js"></script>
</body>
</html>
